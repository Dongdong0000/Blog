{{ if .Page.Store.Get "hasMermaid" }}
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.esm.min.mjs';

  // PaperMod 다크모드 여부에 따라 Mermaid 테마 선택
  const getTheme = () =>
    document.body.classList.contains('dark') ? 'dark' : 'default';

  mermaid.initialize({ startOnLoad: true, theme: getTheme() });

  // 다크모드 토글 시 다이어그램 테마도 다시 렌더
  const observer = new MutationObserver(() => {
    // 이미 렌더된 다이어그램을 원본 코드로 되돌린 뒤 재렌더
    document.querySelectorAll('.mermaid[data-processed]').forEach((el) => {
      el.removeAttribute('data-processed');
      el.innerHTML = el.getAttribute('data-original') || el.innerHTML;
    });
    mermaid.initialize({ startOnLoad: false, theme: getTheme() });
    mermaid.run();
  });

  // 최초 렌더 전에 원본 텍스트 저장
  document.querySelectorAll('pre.mermaid').forEach((el) => {
    el.setAttribute('data-original', el.textContent);
  });

  observer.observe(document.body, { attributes: true, attributeFilter: ['class'] });
</script>
{{ end }}
