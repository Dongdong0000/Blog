baseURL = "https://Dongdong0000.github.io/Research/"
title = "시스템 공부일지"
theme = "hugo-theme-stack"

# 한국어 설정
defaultContentLanguage = "ko"
locale = "ko-kr"          # Hugo 0.158+ 에서 languageCode 를 대체
hasCJKLanguage = true   # 한국어/중국어/일본어 글자 수 계산 및 요약을 정확하게

# 페이지네이션 (한 페이지에 보여줄 글 개수)
[pagination]
  pagerSize = 10

enableRobotsTXT = true
enableEmoji = true
buildDrafts = false
buildFuture = false
buildExpired = false

# ── 코드 하이라이팅 ───────────────────────────
[markup]
  [markup.highlight]
    noClasses = false      # 테마 다크모드와 연동되려면 false 여야 함
    codeFences = true
    guessSyntax = true
    lineNos = true         # 코드 줄번호 표시
    lineNumbersInTable = true
    style = "monokai"
    tabWidth = 4
  # Markdown에서 원시 HTML 허용 (필요 시)
  [markup.goldmark.renderer]
    unsafe = true
  # 목차(TOC) 깊이
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

# ── 분류 체계 ─────────────────────────────────
# 카테고리는 쓰지 않습니다. 네트워크/보안/시스템 은 폴더(섹션)로 이미 나뉘어 있어
# 카테고리를 또 두면 같은 일을 두 번 하게 됩니다. 세부 주제는 태그로 답니다.
[taxonomies]
  tag = "tags"

# ── 사이트 파라미터 ───────────────────────────
[params]
  # 글이 들어있는 섹션 (Stack 기본값은 "post" 인데 이 블로그는 "posts")
  mainSections = ["posts"]
  rssFullContent = true
  description = "C·메모리, 시스템 프로그래밍, OS, 네트워크, 보안 공부 기록"   # 검색엔진·SNS 미리보기용

  [params.dateFormat]
    published = "2006-01-02"
    lastUpdated = "2006-01-02"

  [params.footer]
    since = 2026

  # 왼쪽 사이드바
  [params.sidebar]
    compact = false
    avatar = "img/avatar.png"   # assets/img/avatar.png
    subtitle = "C·메모리부터 OS·네트워크·보안까지"

  [params.article]
    headingAnchor = true
    math = false
    toc = true              # 목차 표시
    readingTime = false     # "2분 정도" 같은 읽는 시간 표시 끔

    # Stack 내장 mermaid — 다크모드 자동 연동 + 확대 모달
    [params.article.mermaid]
      lightTheme = "default"
      darkTheme = "dark"

    [params.article.license]
      enabled = false

  # 홈 우측 위젯 (검색·아카이브·카테고리는 제거함)
  [params.widgets]
    homepage = [
      { type = "tag-cloud", params = { limit = 20 } },
    ]
    page = [{ type = "toc" }]

  [params.comments]
    enabled = false

# ── 상단/사이드바 메뉴 (대분류 섹션) ───────────
[menu]
  [[menu.main]]
    identifier = "network"
    name = "네트워크"
    url = "/posts/network/"
    weight = 10
    [menu.main.params]
      icon = "hash"
  [[menu.main]]
    identifier = "security"
    name = "보안"
    url = "/posts/security/"
    weight = 20
    [menu.main.params]
      icon = "hash"
  [[menu.main]]
    identifier = "system"
    name = "시스템"
    url = "/posts/system/"
    weight = 30
    [menu.main.params]
      icon = "hash"

# ── 출력 포맷 ─────────────────────────────────
[outputs]
  home = ["HTML", "RSS"]
