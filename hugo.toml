baseURL = "https://Dongdong0000.github.io/Blog/"
title = "Blog"
theme = "PaperMod"

# 한국어 설정
defaultContentLanguage = "ko"
languageCode = "ko-kr"
hasCJKLanguage = true   # 한국어/중국어/일본어 글자 수 계산 및 요약을 정확하게

# 페이지네이션 (한 페이지에 보여줄 글 개수)
[pagination]
  pagerSize = 10

enableRobotsTXT = true
enableEmoji = true
buildDrafts = false
buildFuture = false
buildExpired = false

# ── 코드 하이라이팅 ───────────────────────────
[markup]
  [markup.highlight]
    noClasses = false      # PaperMod 다크모드와 연동되려면 false 여야 함
    codeFences = true
    guessSyntax = true
    lineNos = true         # 코드 줄번호 표시
    style = "monokai"
    tabWidth = 4
  # Markdown에서 원시 HTML 허용 (필요 시)
  [markup.goldmark.renderer]
    unsafe = true
  # 목차(TOC) 깊이
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
    ordered = false

# ── 사이트 파라미터 ───────────────────────────
[params]
  env = "production"
  description = "시스템 프로그래밍, 보안, 네트워크 공부 기록"
  author = "Dongdong0000"

  defaultTheme = "auto"       # auto / light / dark
  disableThemeToggle = false
  ShowShareButtons = true
  ShowReadingTime = true
  ShowCodeCopyButtons = true  # 코드 블록 복사 버튼
  ShowWordCount = true
  ShowToc = true              # 목차 표시
  TocOpen = false             # 목차 기본 접힘 상태
  ShowBreadCrumbs = true
  ShowPostNavLinks = true
  ShowRssButtonInSectionTermList = true
  UseHugoToc = true

  [params.homeInfoParams]
    Title = "Research Log \U0001F4DD"
    Content = "시스템 프로그래밍(OS·보안)과 네트워크를 공부하며 남기는 기록입니다."

  # 소셜 아이콘 (원하면 URL 채우기, 안 쓰면 지워도 됨)
  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/Dongdong0000"

# ── 상단 메뉴 ─────────────────────────────────
[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Posts"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "tags"
    name = "Tags"
    url = "/tags/"
    weight = 20
  [[menu.main]]
    identifier = "search"
    name = "Search"
    url = "/search/"
    weight = 30
  [[menu.main]]
    identifier = "archive"
    name = "Archive"
    url = "/archives/"
    weight = 40

# ── 검색 기능용 출력 포맷 ──────────────────────
[outputs]
  home = ["HTML", "RSS", "JSON"]
